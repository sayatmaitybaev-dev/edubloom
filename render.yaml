services:
  - type: web
    name: edubloom
    env: node
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: file:/app/data/edubloom.db
    disk:
      name: data
      mountPath: /app/data
      sizeGB: 1
